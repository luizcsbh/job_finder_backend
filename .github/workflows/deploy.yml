name: 🚀 CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Rodar testes (se existir)
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest || exit 1
          else
            echo "Sem testes, seguindo..."
          fi

      - name: 🔍 Lint (qualidade de código)
        run: |
          pip install flake8
          flake8 . || echo "Avisos de lint ignorados"

      - name: ✅ Build OK
        run: echo "Build validado com sucesso 🚀"