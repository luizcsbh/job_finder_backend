services:
  - type: web
    name: job-finder-backend
    runtime: python
    plan: free
    region: oregon
    branch: main

    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      - key: ENV
        value: production

      - key: PORT
        value: 10000

    autoDeploy: true