services:
  - type: web
    name: job-finder-backend
    runtime: python
    plan: free
    region: oregon
    branch: main

    buildCommand: "pip install -r requirements.txt"

    startCommand: "gunicorn src.api:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2"

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: ENV
        value: production

      - key: STORAGE_PROVIDER
        value: supabase

      - key: DATABASE_URL
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_KEY
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: ALLOWED_ORIGINS
        sync: false

    healthCheckPath: /health
    autoDeploy: true