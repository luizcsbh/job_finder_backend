services:
  - type: web
    name: job-finder-backend
    runtime: python
    plan: free
    region: oregon
    branch: main

    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.api:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: PYTHON_VERSION
        value: 3.11

      - key: ENV
        value: production

      - key: STORAGE_PROVIDER
        value: sqlite

      - key: JWT_SECRET
        generateValue: true

      - key: ALLOWED_ORIGINS
        value: "*" # Will be updated after frontend deploy

    healthCheckPath: /health
    autoDeploy: true
